<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <title>AR Cube</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
      #app { width: 100vw; height: 100vh; }
      canvas { display: block; }

      /* ── HUD ──────────────────────────────────────────────────── */
      #hud {
        position: fixed; inset: 0;
        pointer-events: none; z-index: 10;
      }

      #panel {
        position: absolute; top: 16px; left: 16px;
        background: rgba(0,0,0,0.6);
        border: 1px solid rgba(255,50,50,0.45);
        border-radius: 10px;
        padding: 12px 16px;
        color: #fff; font-size: 11px; line-height: 1.9;
        min-width: 210px;
        backdrop-filter: blur(8px);
      }

      #panel h3 {
        color: #ff3c3c; font-size: 12px;
        letter-spacing: .12em; text-transform: uppercase;
        margin-bottom: 6px;
        border-bottom: 1px solid rgba(255,50,50,0.25);
        padding-bottom: 5px;
      }

      .row { display: flex; justify-content: space-between; gap: 10px; }
      .lbl { color: rgba(255,255,255,.45); }
      .val { color: #fff; font-weight: bold; }

      #badge {
        position: absolute; bottom: 36px; left: 50%;
        transform: translateX(-50%);
        background: rgba(255,40,40,0.12);
        border: 1px solid rgba(255,50,50,0.55);
        border-radius: 999px;
        padding: 9px 22px;
        color: #ff4444; font-size: 13px;
        letter-spacing: .07em;
        backdrop-filter: blur(8px);
        white-space: nowrap;
      }

      /* ── Loading ──────────────────────────────────────────────── */
      #loading {
        position: fixed; inset: 0; z-index: 100;
        background: #080808;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
        transition: opacity .5s ease;
      }
      #loading.gone { opacity: 0; pointer-events: none; }

      .l-title { color: #ff3c3c; font-size: 20px; letter-spacing: .2em; text-transform: uppercase; }
      .l-sub   { color: rgba(255,255,255,.35); font-size: 11px; letter-spacing: .12em; }
      #loading-status { color: rgba(255,255,255,.5); font-size: 11px; }

      .bar-wrap { width: 180px; height: 2px; background: rgba(255,255,255,.08); border-radius: 2px; overflow: hidden; }
      .bar      { height: 100%; background: #ff3c3c; border-radius: 2px; animation: fill 1.6s ease-in-out infinite; }
      @keyframes fill { 0%{width:0%} 60%{width:75%} 100%{width:100%} }

      #err { color: #ff7070; font-size: 11px; text-align: center; max-width: 270px; line-height: 1.6; display: none; }
    </style>
  </head>
  <body>

    <div id="loading">
      <div class="l-title">AR Cube</div>
      <div class="l-sub">Point your phone at the world</div>
      <div class="bar-wrap"><div class="bar"></div></div>
      <div id="loading-status">Starting camera…</div>
      <div id="err"></div>
    </div>

    <div id="app"></div>

    <div id="hud">
      <div id="panel">
        <h3>📍 GPS Anchor</h3>
        <div class="row"><span class="lbl">My Lat</span> <span class="val" id="my-lat">—</span></div>
        <div class="row"><span class="lbl">My Lon</span> <span class="val" id="my-lon">—</span></div>
        <div class="row"><span class="lbl">Accuracy</span> <span class="val" id="my-acc">—</span></div>
        <div class="row"><span class="lbl">Distance</span> <span class="val" id="my-dist">—</span></div>
        <div class="row"><span class="lbl">Target</span> <span class="val">59.8367, 13.5406</span></div>
      </div>
      <div id="badge">📦 Waiting for GPS…</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
  <script>eruda.init();</script>
</html>
