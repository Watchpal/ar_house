<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>AR Castle — Park Experience</title>

    <!-- AR.js + A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ── SPLASH SCREEN ── -->
    <div id="splash">
      <div class="splash-inner">
        <div class="castle-icon">🏰</div>
        <h1>Castle AR</h1>
        <p class="subtitle">
          Point your camera at the park to reveal an ancient castle
        </p>
        <div class="location-status" id="location-status">
          <span class="dot"></span>
          <span id="status-text">Checking your location…</span>
        </div>
        <button id="start-btn" class="btn" disabled>
          <span>Start Experience</span>
        </button>
        <p class="hint" id="hint-text">
          You must be within <strong>50 meters</strong> of the target location.
        </p>
      </div>
    </div>

    <!-- ── OUT OF RANGE OVERLAY ── -->
    <div id="out-of-range" class="overlay hidden">
      <div class="overlay-card">
        <div class="icon">📍</div>
        <h2>You're too far away</h2>
        <p>
          Visit <strong id="target-name">Stadsparken</strong> to see the castle.
        </p>
        <p class="distance-display">
          You are <span id="distance-display">—</span> away.
        </p>
        <button
          class="btn"
          onclick="
            document.getElementById('out-of-range').classList.add('hidden')
          "
        >
          Got it
        </button>
      </div>
    </div>

    <!-- ── AR SCENE (hidden until started) ── -->
    <div id="ar-wrapper" class="hidden">
      <!-- HUD -->
      <div id="hud">
        <div id="hud-title">🏰 Ancient Castle</div>
        <div id="hud-coords"></div>
      </div>
      <button id="exit-btn" onclick="exitAR()">✕ Exit</button>

      <a-scene
        id="ar-scene"
        vr-mode-ui="enabled: false"
        loading-screen="enabled: false"
        renderer="logarithmicDepthBuffer: true; colorManagement: true;"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
        embedded
      >
        <a-assets>
          <!-- Fallback: a simple procedural castle made from A-Frame primitives -->
          <!-- Replace the <a-entity gltf-model> below with your real .glb file when ready -->
        </a-assets>

        <a-camera gps-camera rotation-reader></a-camera>

        <!--
        ═══════════════════════════════════════════════════════
        🎯 TARGET LOCATION — EDIT THESE COORDINATES
           Set latitude/longitude to your exact park spot.
           The castle will appear anchored to this GPS position.
        ═══════════════════════════════════════════════════════
      -->
        <a-entity
          id="castle-entity"
          gps-entity-place="latitude: 59.836682053092346; longitude: 13.54035725371799;"
          castle-model
          scale="5 5 5"
        ></a-entity>
      </a-scene>
    </div>

    <script src="js/castle-component.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
