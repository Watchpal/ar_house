<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>House AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
    }

    canvas { display: block; }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0a;
      color: #e8e0d0;
      z-index: 100;
      transition: opacity 0.6s ease;
    }

    #loading-overlay h1 {
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0.7;
    }

    #loading-bar {
      width: 220px; height: 2px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    #loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #e8e0d0;
      transition: width 0.3s ease;
    }

    #loading-label {
      margin-top: 1rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      opacity: 0.4;
    }

    /* ── GPS debug badge ── */
    #debug-gps {
      position: fixed;
      bottom: 1.2rem; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: rgba(255,255,255,0.6);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 0.4rem 0.9rem;
      border-radius: 99px;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      position: fixed;
      top: 1rem; left: 50%;
      transform: translateX(-50%);
      max-width: 90vw;
      background: rgba(200, 50, 50, 0.85);
      color: #fff;
      font-size: 0.8rem;
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      text-align: center;
      z-index: 20;
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-overlay">
    <h1>House AR</h1>
    <div id="loading-bar"><div id="loading-bar-fill"></div></div>
    <div id="loading-label">Initialising…</div>
  </div>

  <!-- GPS coordinate badge (bottom of screen) -->
  <div id="debug-gps">Waiting for GPS…</div>

  <!-- Error banner -->
  <div id="error-banner"></div>

  <!-- Entry point -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
